<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡単タイムカード</title>
  <style>
    /* ===== 全体のリセットと基本スタイル ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    /* ===== カード全体のコンテナ ===== */
    .card {
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 40px 36px;
      width: 100%;
      max-width: 480px;
    }

    /* ===== タイトル ===== */
    .title {
      font-size: 28px;
      font-weight: 700;
      color: #1a202c;
      text-align: center;
      margin-bottom: 8px;
    }

    /* ===== 今日の日付 ===== */
    .date {
      font-size: 16px;
      color: #718096;
      text-align: center;
      margin-bottom: 32px;
    }

    /* ===== 記録表示エリア ===== */
    .records {
      background-color: #f7fafc;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    /* ===== 各レコード行（ラベル＋値） ===== */
    .record-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #e2e8f0;
    }

    /* 最後の行は区切り線なし */
    .record-row:last-child {
      border-bottom: none;
    }

    /* ラベル（出勤・退勤・勤務時間） */
    .record-label {
      font-size: 15px;
      color: #4a5568;
      font-weight: 500;
    }

    /* 時刻・時間の値 */
    .record-value {
      font-size: 18px;
      font-weight: 700;
      color: #2d3748;
    }

    /* 未記録の場合のスタイル */
    .record-value.empty {
      font-size: 14px;
      color: #a0aec0;
      font-weight: 400;
    }

    /* 勤務時間は色を変えて強調 */
    .record-value.duration {
      color: #3182ce;
    }

    /* ===== ボタンエリア ===== */
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ボタン共通スタイル */
    .btn {
      flex: 1;
      min-width: 100px;
      padding: 14px 8px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* 出勤ボタン（緑系） */
    .btn-checkin {
      background-color: #48bb78;
      color: #ffffff;
    }

    .btn-checkin:hover {
      opacity: 0.88;
    }

    /* 退勤ボタン（青系） */
    .btn-checkout {
      background-color: #4299e1;
      color: #ffffff;
    }

    .btn-checkout:hover {
      opacity: 0.88;
    }

    /* リセットボタン（グレー系） */
    .btn-reset {
      background-color: #e2e8f0;
      color: #4a5568;
    }

    .btn-reset:hover {
      opacity: 0.78;
    }

    /* ===== 無効状態のボタン ===== */
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== メッセージ表示エリア ===== */
    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      display: none; /* 初期は非表示 */
    }

    .message.success {
      background-color: #c6f6d5;
      color: #276749;
    }

    .message.info {
      background-color: #bee3f8;
      color: #2c5282;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- タイトル -->
  <h1 class="title">簡単タイムカード</h1>

  <!-- 今日の日付（JSで動的に表示） -->
  <p class="date" id="today-date"></p>

  <!-- 記録表示エリア -->
  <div class="records">
    <div class="record-row">
      <span class="record-label">出勤時刻</span>
      <span class="record-value empty" id="checkin-time">未記録</span>
    </div>
    <div class="record-row">
      <span class="record-label">退勤時刻</span>
      <span class="record-value empty" id="checkout-time">未記録</span>
    </div>
    <div class="record-row">
      <span class="record-label">勤務時間</span>
      <span class="record-value empty" id="duration">未記録</span>
    </div>
  </div>

  <!-- ボタン3つ -->
  <div class="buttons">
    <button class="btn btn-checkin"  id="btn-checkin"  onclick="recordCheckin()">出勤</button>
    <button class="btn btn-checkout" id="btn-checkout" onclick="recordCheckout()">退勤</button>
    <button class="btn btn-reset"    id="btn-reset"    onclick="resetRecord()">リセット</button>
  </div>

  <!-- 操作後のフィードバックメッセージ -->
  <p class="message" id="message"></p>

</div>

<script>
  // ===== キー定義（localStorageに保存するときのキー名） =====
  const STORAGE_KEY_CHECKIN  = 'timecard_checkin';   // 出勤時刻
  const STORAGE_KEY_CHECKOUT = 'timecard_checkout';  // 退勤時刻
  const STORAGE_KEY_DATE     = 'timecard_date';      // 記録した日付

  // ===== 今日の日付を「YYYY-MM-DD」形式で返す =====
  function getTodayString() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  // ===== 今日の日付を日本語表記で返す（例：2025年4月14日（月）） =====
  function getTodayLabel() {
    var now = new Date();
    var weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    var y = now.getFullYear();
    var m = now.getMonth() + 1;
    var d = now.getDate();
    var w = weekdays[now.getDay()];
    return y + '年' + m + '月' + d + '日（' + w + '）';
  }

  // ===== 現在時刻を「HH:MM:SS」形式で返す =====
  function getCurrentTimeString() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    return h + ':' + m + ':' + s;
  }

  // ===== 2つの時刻文字列（HH:MM:SS）から勤務時間を計算して返す =====
  // 例: '09:00:00' と '18:30:00' → '9時間30分'
  function calcDuration(checkin, checkout) {
    // 「HH:MM:SS」を分単位の数値に変換する
    function toMinutes(timeStr) {
      var parts = timeStr.split(':').map(Number);
      return parts[0] * 60 + parts[1] + parts[2] / 60;
    }

    var diffMinutes = toMinutes(checkout) - toMinutes(checkin);

    // 退勤が出勤より前の場合（日付をまたいだケース等）はnullを返す
    if (diffMinutes < 0) {
      return null;
    }

    var hours = Math.floor(diffMinutes / 60);
    var mins  = Math.floor(diffMinutes % 60);
    return hours + '時間' + mins + '分';
  }

  // ===== 画面の表示を更新する =====
  function updateDisplay(checkin, checkout) {
    var checkinEl  = document.getElementById('checkin-time');
    var checkoutEl = document.getElementById('checkout-time');
    var durationEl = document.getElementById('duration');

    // 出勤時刻の表示
    if (checkin) {
      checkinEl.textContent = checkin;
      checkinEl.className = 'record-value';
    } else {
      checkinEl.textContent = '未記録';
      checkinEl.className = 'record-value empty';
    }

    // 退勤時刻の表示
    if (checkout) {
      checkoutEl.textContent = checkout;
      checkoutEl.className = 'record-value';
    } else {
      checkoutEl.textContent = '未記録';
      checkoutEl.className = 'record-value empty';
    }

    // 勤務時間の表示（出勤・退勤の両方がある場合のみ計算）
    if (checkin && checkout) {
      var duration = calcDuration(checkin, checkout);
      if (duration !== null) {
        durationEl.textContent = duration;
        durationEl.className = 'record-value duration'; // 青色で表示
      } else {
        durationEl.textContent = '計算できません';
        durationEl.className = 'record-value empty';
      }
    } else {
      durationEl.textContent = '未記録';
      durationEl.className = 'record-value empty';
    }

    // ボタンの有効・無効を切り替える
    updateButtons(checkin, checkout);
  }

  // ===== ボタンの有効・無効を状態に応じて切り替える =====
  function updateButtons(checkin, checkout) {
    var checkinBtn  = document.getElementById('btn-checkin');
    var checkoutBtn = document.getElementById('btn-checkout');
    var resetBtn    = document.getElementById('btn-reset');

    // 出勤済みなら「出勤」ボタンを無効化
    checkinBtn.disabled = !!checkin;

    // 出勤前、または退勤済みなら「退勤」ボタンを無効化
    checkoutBtn.disabled = !checkin || !!checkout;

    // 記録が何もなければ「リセット」ボタンを無効化
    resetBtn.disabled = !checkin && !checkout;
  }

  // ===== メッセージを一定時間表示する =====
  function showMessage(text, type) {
    var el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + (type || 'success');
    el.style.display = 'block';

    // 3秒後に自動的に非表示にする
    setTimeout(function() {
      el.style.display = 'none';
    }, 3000);
  }

  // ===== 出勤ボタンが押されたときの処理 =====
  function recordCheckin() {
    var today   = getTodayString();
    var nowTime = getCurrentTimeString();

    // localStorageに保存
    localStorage.setItem(STORAGE_KEY_DATE,    today);
    localStorage.setItem(STORAGE_KEY_CHECKIN, nowTime);

    // 画面を更新
    updateDisplay(nowTime, null);
    showMessage('出勤を記録しました：' + nowTime, 'success');
  }

  // ===== 退勤ボタンが押されたときの処理 =====
  function recordCheckout() {
    var nowTime = getCurrentTimeString();
    var checkin = localStorage.getItem(STORAGE_KEY_CHECKIN);

    // 出勤記録がない場合は処理しない（念のため）
    if (!checkin) {
      showMessage('先に出勤を記録してください', 'info');
      return;
    }

    // localStorageに保存
    localStorage.setItem(STORAGE_KEY_CHECKOUT, nowTime);

    // 画面を更新
    updateDisplay(checkin, nowTime);
    showMessage('退勤を記録しました：' + nowTime, 'success');
  }

  // ===== リセットボタンが押されたときの処理 =====
  function resetRecord() {
    // localStorageのタイムカード関連データを削除
    localStorage.removeItem(STORAGE_KEY_CHECKIN);
    localStorage.removeItem(STORAGE_KEY_CHECKOUT);
    localStorage.removeItem(STORAGE_KEY_DATE);

    // 画面を初期状態に戻す
    updateDisplay(null, null);
    showMessage('記録をリセットしました', 'info');
  }

  // ===== ページ読み込み時の初期化処理 =====
  function init() {
    // 今日の日付を表示
    document.getElementById('today-date').textContent = getTodayLabel();

    // localStorageから保存済みデータを読み込む
    var savedDate     = localStorage.getItem(STORAGE_KEY_DATE);
    var savedCheckin  = localStorage.getItem(STORAGE_KEY_CHECKIN);
    var savedCheckout = localStorage.getItem(STORAGE_KEY_CHECKOUT);
    var today         = getTodayString();

    // 保存された日付が今日と同じ場合のみデータを復元する
    // （昨日以前のデータは表示しない）
    if (savedDate === today && savedCheckin) {
      updateDisplay(savedCheckin, savedCheckout || null);
    } else {
      // 日付が変わっていたら古いデータをクリア
      if (savedDate && savedDate !== today) {
        localStorage.removeItem(STORAGE_KEY_CHECKIN);
        localStorage.removeItem(STORAGE_KEY_CHECKOUT);
        localStorage.removeItem(STORAGE_KEY_DATE);
      }
      updateDisplay(null, null);
    }
  }

  // ページ読み込み完了後に初期化を実行
  init();
</script>

</body>
</html>
